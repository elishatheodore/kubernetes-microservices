{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.serviceMonitor.enabled }}
{{/*
Backend ServiceMonitor
*/}}
{{- if gt (.Values.replicaCount.backend | int) 0 }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "camp.backend.fullname" . }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.backend.name }}
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      {{- include "camp.backend.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: {{ .Values.monitoring.serviceMonitor.path }}
    interval: {{ .Values.monitoring.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}

{{/*
Web ServiceMonitor
*/}}
{{- if gt (.Values.replicaCount.web | int) 0 }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "camp.web.fullname" . }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
