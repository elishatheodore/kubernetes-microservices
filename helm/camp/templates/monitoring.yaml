{{- if .Values.monitoring.podMonitor.enabled }}
{{/*
Pod Monitor
*/}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "camp.fullname" . }}-pods
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      {{- include "camp.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
  - port: http
    path: {{ .Values.monitoring.podMonitor.path }}
    interval: {{ .Values.monitoring.podMonitor.interval }}
    scrapeTimeout: {{ .Values.monitoring.podMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
