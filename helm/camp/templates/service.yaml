{{/*
Backend Service
*/}}
{{- if gt (.Values.replicaCount.backend | int) 0 }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "camp.backend.fullname" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.backend.name }}
  {{- with .Values.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "camp.backend.selectorLabels" . | nindent 4 }}
{{- end }}

