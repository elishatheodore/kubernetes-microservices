{{/*
Backend Deployment
*/}}
{{- if gt (.Values.replicaCount.backend | int) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "camp.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.backend.name }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (include "camp.backend.autoscaling.enabled" .) }}
  replicas: {{ .Values.replicaCount.backend }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "camp.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camp.backend.selectorLabels" . | nindent 8 }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "camp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Values.backend.name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ include "camp.backend.image" . }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.service.targetPort }}
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.backend.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.backend.readinessProbe | nindent 10 }}
        env:
        - name: DATABASE_URL
          value: {{ .Values.config.databaseUrl | quote }}
        - name: DEBUG
          value: {{ .Values.config.debug | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.config.logLevel | quote }}
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "camp.secretName" . }}
              key: SECRET_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "camp.secretName" . }}
              key: JWT_SECRET
        - name: PYTHONUNBUFFERED
          value: {{ .Values.config.pythonUnbuffered | quote }}
        - name: PYTHONPATH
          value: {{ .Values.config.pythonpath | quote }}
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        {{- with .Values.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.extraEnv }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        {{- with .Values.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.backend.persistence.uploads.enabled }}
        - name: uploads-storage
          mountPath: {{ .Values.backend.persistence.uploads.mountPath }}
        {{- end }}
        {{- if .Values.backend.persistence.database.enabled }}
        - name: database-storage
          mountPath: {{ .Values.backend.persistence.database.mountPath }}
          subPath: {{ .Values.backend.persistence.database.subPath }}
        {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.persistence.uploads.enabled }}
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: {{ include "camp.backend.fullname" . }}-uploads
      {{- end }}
      {{- if .Values.backend.persistence.database.enabled }}
      - name: database-storage
        persistentVolumeClaim:
          claimName: {{ include "camp.backend.fullname" . }}-database
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

