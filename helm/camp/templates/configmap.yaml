apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "camp.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  DEBUG: {{ .Values.config.debug | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  API_V1_PREFIX: {{ .Values.config.apiV1Prefix | quote }}
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
  STORAGE_TYPE: {{ .Values.config.storageType | quote }}
  LOCAL_STORAGE_PATH: {{ .Values.config.localStoragePath | quote }}
  MAX_FILE_SIZE: {{ .Values.config.maxFileSize | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  PYTHONUNBUFFERED: {{ .Values.config.pythonUnbuffered | quote }}
  PYTHONPATH: {{ .Values.config.pythonpath | quote }}
