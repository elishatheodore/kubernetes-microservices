{{- if .Values.ingress.enabled -}}
{{- $fullName := include "camp.fullname" . -}}
{{- $svcPort := .Values.backend.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "camp.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if $.Capabilities.APIVersion.Has "networking.k8s.io/v1/Ingress" }}
              service:
                name: {{ include (printf "camp.%s.fullname" .service) $ }}-service
                port:
                  number: {{ $.Values.(.service).service.port }}
              {{- else }}
              serviceName: {{ include (printf "camp.%s.fullname" .service) $ }}-service
              servicePort: {{ $.Values.(.service).service.port }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
