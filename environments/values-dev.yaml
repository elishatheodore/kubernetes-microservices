# Development Environment Configuration
# This file contains all development-specific overrides

# Environment metadata
environment: development
clusterType: local
region: local

# Global configuration
global:
  imageRegistry: ghcr.io
  imagePullSecrets: []
  storageClass: standard
  environment: development

# Image configuration
image:
  registry: ghcr.io
  repository: elishatheodore/kubernetes-microservices
  pullPolicy: IfNotPresent
  tag: "latest"

# Replica configuration for development
replicaCount:
  backend: 1
  web: 1
  auth: 1

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Resource configuration for development
resources:
  backend:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  web:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  auth:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: camp-dev.local
      paths:
        - path: /api(/|$)(.*)
          pathType: Prefix
          service: backend
        - path: /auth(/|$)(.*)
          pathType: Prefix
          service: auth
        - path: /(.*)
          pathType: Prefix
          service: web
  tls: []

# Application configuration
config:
  databaseUrl: "sqlite:///./camp.db"
  debug: true
  logLevel: debug
  apiV1Prefix: "/api/v1"
  appName: "Cloud Asset Management Platform (Dev)"
  appVersion: "1.0.0-dev"
  storageType: local
  localStoragePath: "./uploads"
  maxFileSize: "52428800"
  corsOrigins: "http://localhost:3004,http://localhost:3000,http://camp-dev.local"
  pythonUnbuffered: "1"
  pythonpath: "/app"

# Secrets configuration
secrets:
  secretKey: "dev-secret-key-change-in-production"
  jwtSecret: "dev-jwt-secret-change-in-production"
  defaultPassword: "admin123"

# Storage configuration
persistence:
  uploads:
    enabled: true
    storageClass: standard
    accessMode: ReadWriteOnce
    size: 5Gi
    mountPath: /app/uploads
  database:
    enabled: true
    storageClass: standard
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /app/camp.db
    subPath: camp.db

# Autoscaling (disabled for development)
autoscaling:
  backend:
    enabled: false
  web:
    enabled: false
  auth:
    enabled: false

# Monitoring (minimal for development)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
  podMonitor:
    enabled: false

# Network policies (disabled for development)
networkPolicy:
  enabled: false

# Resource quotas (minimal for development)
resourceQuota:
  enabled: true
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
  persistentvolumeclaims: "5"
  pods: "10"
  services: "5"
  secrets: "5"
  configmaps: "5"

# Node selector (none for development)
nodeSelector: {}

# Tolerations (none for development)
tolerations: []

# Affinity (none for development)
affinity: {}

# Additional labels
commonLabels:
  environment: development
  managed-by: helm
  tier: application

# Additional annotations
commonAnnotations:
  config.kubernetes.io/origin: helm-chart
  config.kubernetes.io/version: v1.0.0-dev
