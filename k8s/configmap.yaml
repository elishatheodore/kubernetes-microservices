apiVersion: v1
kind: ConfigMap
metadata:
  name: camp-config
  namespace: camp
  labels:
    app: camp
    component: config
data:
  DATABASE_URL: "sqlite:///./camp.db"
  DEBUG: "false"
  LOG_LEVEL: "info"
  API_V1_PREFIX: "/api/v1"
  APP_NAME: "Cloud Asset Management Platform"
  APP_VERSION: "1.0.0"
  STORAGE_TYPE: "local"
  LOCAL_STORAGE_PATH: "./uploads"
  MAX_FILE_SIZE: "52428800"
  CORS_ORIGINS: "http://localhost:3004,http://localhost:3000"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "/app"
