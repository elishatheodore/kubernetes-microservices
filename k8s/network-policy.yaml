apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: camp-network-policy
  namespace: camp
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: camp
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3004
    - protocol: TCP
      port: 80
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: camp
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3004
    - protocol: TCP
      port: 80
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
