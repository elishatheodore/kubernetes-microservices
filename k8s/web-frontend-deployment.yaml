apiVersion: apps/v1
kind: Deployment
metadata:
  name: camp-web
  namespace: camp
  labels:
    app: camp
    component: web-frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: camp
      component: web-frontend
  template:
    metadata:
      labels:
        app: camp
        component: web-frontend
        version: v1
    spec:
      containers:
      - name: camp-web
        image: ghcr.io/elishatheodore/kubernetes-microservices/camp-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3004
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: camp-web-service
  namespace: camp
  labels:
    app: camp
    component: web-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3004
    protocol: TCP
    name: http
  selector:
    app: camp
    component: web-frontend
