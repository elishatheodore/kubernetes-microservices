apiVersion: v1
kind: ServiceMonitor
metadata:
  name: camp-backend-monitor
  namespace: camp
  labels:
    app: camp
    component: backend
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app: camp
      component: backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
